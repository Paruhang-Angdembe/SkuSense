version: 2

models:
  - name: stg_inventory_silver
    description: "Staging model for the Glue Silver inventory snapshot table queried through Athena. Grain: one row per snapshot_date, product_id, warehouse_id."
    columns:
      - name: product_id
        description: "Product SKU identifier."
        tests:
          - not_null

      - name: warehouse_id
        description: "Warehouse identifier."
        tests:
          - not_null

      - name: snapshot_date
        description: "Inventory snapshot date."
        tests:
          - not_null

      - name: qty_on_hand
        description: "Current on-hand quantity for the SKU in the warehouse snapshot."
        tests:
          - not_null
